<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sisyphus: The Eternal Climb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gold: #FFD740;
      --primary-blue: #2962FF;
      --success-green: #00E676;
      --fail-red: #FF5252;
      --bg-dark: rgba(20, 20, 30, 0.85);
      --text-light: #ECEFF1;
      --font-title: 'Cinzel', serif;
      --font-body: 'Lato', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e; /* Fallback */
      font-family: var(--font-body);
      user-select: none;
      color: var(--text-light);
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* --- HUD --- */
    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }

    .hud-panel {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(5px);
      padding: 10px 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 20px;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .currency-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 16px;
    }

    .currency-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
    }

    .currency-icon.obolus  { background: #cd7f32; }
    .currency-icon.drachma { background: #e0e0e0; }
    .currency-icon.stater  { background: #ffd700; }
    .currency-icon.ingot   { background: linear-gradient(135deg, #b87333, #ffd700); border-radius: 4px; }

    .currency-icon.obolus::after  { content: 'C'; }
    .currency-icon.drachma::after { content: 'S'; }
    .currency-icon.stater::after  { content: 'G'; }
    .currency-icon.ingot::after   { content: 'I'; }

    #hud-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    #hud-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      width: 300px;
      pointer-events: none;
    }

    .hud-metric {
      background: rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .hud-metric-label {
      font-size: 10px;
      letter-spacing: 0.5px;
      color: #9fb0c2;
      text-transform: uppercase;
      line-height: 1;
    }

    .hud-metric-value {
      font-family: var(--font-title);
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
    }

    /* --- Judgment Bar --- */
    #judgment-bar-container {
      position: absolute;
      display: none;
      z-index: 20;
      pointer-events: none;
      /* Centered above player handled by JS, but we style the bar itself */
    }

    #judgment-bar {
      position: relative;
      height: 24px; /* Matches config */
      background: rgba(0, 0, 0, 0.6);
      border: 2px solid #555;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    #judgment-bar-fail-bg {
      width: 100%;
      height: 100%;
      position: absolute;
      background: var(--fail-red);
      opacity: 0.3;
    }

    #judgment-bar-crit {
      position: absolute;
      top: 0;
      height: 100%;
      background: #FFF;
      opacity: 0.8;
      z-index: 3;
      display: none;
    }

    #judgment-bar-pointer {
      position: absolute;
      top: -4px;
      width: 4px;
      height: 32px;
      background: var(--primary-gold);
      border: 1px solid #FFF;
      box-shadow: 0 0 5px var(--primary-gold);
      z-index: 10;
      transform: translateX(-50%);
    }

    /* --- Notifications --- */
    #checkpoint-notification {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-title);
      color: var(--primary-gold);
      font-size: 48px;
      font-weight: 700;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
      opacity: 0;
      z-index: 30;
      pointer-events: none;
      transition: opacity 0.5s, transform 0.5s;
    }
    
    #checkpoint-notification.show {
      opacity: 1;
      transform: translate(-50%, -60%);
    }

    /* --- Shop --- */
    #shop-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(10, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      display: none;
      z-index: 50;
      overflow-y: auto;
      font-family: var(--font-body);
    }

    #shop-content {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    #shop-content h1 {
      font-family: var(--font-title);
      text-align: center;
      font-size: 42px;
      color: var(--primary-gold);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #shop-stats {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .shop-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .shop-section h2 {
      font-family: var(--font-title);
      font-size: 24px;
      color: var(--text-light);
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .upgrade-grid, .artifact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .upgrade-card, .artifact-card {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .upgrade-card:hover:not(.locked):not(.maxed), 
    .artifact-card:hover:not(.unavailable) {
      transform: translateY(-4px);
      border-color: var(--primary-gold);
      box-shadow: 0 4px 12px rgba(255, 215, 64, 0.1);
    }

    .upgrade-card.locked, .artifact-card.unavailable {
      opacity: 0.5;
      filter: grayscale(1);
      cursor: not-allowed;
    }

    .upgrade-card.maxed {
      border-color: rgba(0, 230, 118, 0.4);
      cursor: default;
    }

    .upgrade-name, .artifact-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      color: var(--text-light);
    }

    .upgrade-desc, .artifact-desc {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .upgrade-cost, .artifact-cost {
      font-weight: 700;
      color: var(--primary-gold);
      font-size: 14px;
    }

    #shop-depart-btn {
      display: block;
      margin: 40px auto;
      padding: 16px 64px;
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      background: var(--primary-gold);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(255, 215, 64, 0.4);
    }

    #shop-depart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 215, 64, 0.6);
    }

    /* --- Log Button --- */
    #log-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 60;
      width: 36px;
      height: 36px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    #log-btn:hover { opacity: 1; }
    #log-btn span {
      display: block;
      width: 16px;
      height: 2px;
      background: #ccc;
      border-radius: 1px;
    }

    /* --- Log Overlay --- */
    #log-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #log-panel {
      background: rgba(15, 15, 25, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 28px 32px;
      width: min(860px, 92vw);
      max-height: 80vh;
      overflow-y: auto;
      font-family: var(--font-body);
      color: var(--text-light);
    }

    #log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    #log-title {
      font-family: var(--font-title);
      font-size: 22px;
      color: var(--primary-gold);
      letter-spacing: 1px;
    }

    #log-close-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
    }
    #log-close-btn:hover { color: #fff; }

    #log-summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .log-stat {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 10px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 110px;
    }

    .log-stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .log-stat-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary-gold);
    }

    #log-empty {
      color: #666;
      text-align: center;
      padding: 24px 0;
    }

    #log-table-wrap {
      overflow-x: auto;
    }

    #log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    #log-table th {
      text-align: left;
      padding: 8px 12px;
      color: #888;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #log-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #ddd;
    }

    #log-table tbody tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    #log-table tbody tr:first-child td {
      color: #fff;
      font-weight: 600;
    }
    /* --- Map Select (placeholder) --- */
    #map-select-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 22, 0.88);
      backdrop-filter: blur(8px);
      display: none;
      z-index: 80;
      overflow-y: auto;
    }

    #map-select-content {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px;
      text-align: center;
    }

    #map-select-content h1 {
      font-family: var(--font-title);
      font-size: 38px;
      color: var(--primary-gold);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    #map-select-content p {
      color: #cfd8dc;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    #map-select-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .map-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-light);
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .map-card:hover {
      transform: translateY(-2px);
      border-color: var(--primary-gold);
    }

    .map-card-title {
      font-family: var(--font-title);
      font-size: 18px;
      color: #fff;
      margin-bottom: 6px;
    }

    .map-card-sub {
      font-size: 12px;
      color: #9fb0c2;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .map-card-reward {
      font-size: 13px;
      color: var(--primary-gold);
      font-weight: 700;
    }
    /* --- Run End Menu --- */
    #run-end-overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 12, 22, 0.82);
      backdrop-filter: blur(6px);
      display: none;
      z-index: 90;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #run-end-panel {
      width: min(460px, 92vw);
      background: rgba(20, 24, 36, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      padding: 26px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    #run-end-panel h2 {
      font-family: var(--font-title);
      color: var(--primary-gold);
      font-size: 30px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    #run-end-peak-wrap {
      color: #d8e2ea;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #run-end-peak {
      display: inline-block;
      margin-left: 8px;
      color: #fff;
      font-weight: 700;
      font-size: 26px;
    }

    .run-end-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .run-end-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-light);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .run-end-btn:hover {
      transform: translateY(-1px);
      border-color: var(--primary-gold);
    }
    #dev-buffs {
      margin-top: 6px;
      padding: 8px 10px;
      min-width: 220px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px dashed rgba(255, 255, 255, 0.35);
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.35;
      color: #d7e2ee;
      text-align: left;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
      pointer-events: none;
    }

    .dev-buff-title {
      color: #ffd740;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-panel" id="hud-left">
        <div class="currency-display"><div class="currency-icon obolus"></div> <span id="hud-obolus">0</span></div>
        <div class="currency-display"><div class="currency-icon drachma"></div> <span id="hud-drachma">0</span></div>
        <div class="currency-display"><div class="currency-icon stater"></div> <span id="hud-stater">0</span></div>
        <div class="currency-display"><div class="currency-icon ingot"></div> <span id="hud-ingot">0</span></div>
      </div>
      <div id="hud-right">
        <div id="hud-metrics">
          <div class="hud-metric">
            <span class="hud-metric-label">Current Height</span>
            <span id="hud-height" class="hud-metric-value">0m</span>
          </div>
          <div class="hud-metric">
            <span class="hud-metric-label">Max Height</span>
            <span id="hud-max-height" class="hud-metric-value">0m</span>
          </div>
          <div class="hud-metric">
            <span class="hud-metric-label">Longest Distance</span>
            <span id="hud-longest-distance" class="hud-metric-value">0m</span>
          </div>
          <div class="hud-metric">
            <span class="hud-metric-label">Current Distance</span>
            <span id="hud-current-distance" class="hud-metric-value">0m</span>
          </div>
        </div>
        <div id="dev-buffs"></div>
      </div>
    </div>

    <!-- Judgment bar -->
    <div id="judgment-bar-container">
      <div id="judgment-bar">
        <div id="judgment-bar-fail-bg"></div>
        <div id="judgment-bar-crit"></div>
        <div id="judgment-bar-crit2"></div>
        <div id="judgment-bar-pointer"></div>
      </div>
    </div>

    <!-- Wedge info -->
    <div id="wedge-info"></div>

    <!-- Checkpoint notification -->
    <div id="checkpoint-notification">CHECKPOINT REACHED</div>

    <!-- Log button (hamburger) -->
    <button id="log-btn" title="Run Log">
      <span></span><span></span><span></span>
    </button>

    <!-- Log overlay -->
    <div id="log-overlay">
      <div id="log-panel"></div>
    </div>


    <!-- Map select overlay (placeholder) -->
    <div id="map-select-overlay">
      <div id="map-select-content">
        <h1>Select Map</h1>
        <p>Placeholder map copies: choose one reward-focused map to start.</p>
        <div id="map-select-list"></div>
      </div>
    </div>

    <!-- Run end menu -->
    <div id="run-end-overlay">
      <div id="run-end-panel">
        <h2>Run Ended</h2>
        <div id="run-end-peak-wrap">Peak Height:<span id="run-end-peak">0m</span></div>
        <div class="run-end-actions">
          <button id="run-end-continue-btn" class="run-end-btn">Continue</button>
          <button id="run-end-map-btn" class="run-end-btn">Back To Maps</button>
        </div>
      </div>
    </div>
    <!-- Shop overlay -->
    <div id="shop-overlay">
      <div id="shop-content">
        <h1>Hermes' Blessing</h1>
        <div id="shop-stats"></div>
        
        <div class="shop-section">
          <h2>Upgrades</h2>
          <div id="shop-upgrades" class="upgrade-grid"></div>
        </div>

        <div class="shop-section" id="shop-artifact-section" style="display:none">
          <h2>Artifact Forge</h2>
          <div id="shop-artifacts" class="artifact-grid"></div>
        </div>

        <button id="shop-depart-btn">CLIMB AGAIN</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
